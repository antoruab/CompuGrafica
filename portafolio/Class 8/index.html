<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphics 2026</title>

    <link rel="icon" type="image/png" href="../../src/img/Icono computador.png">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="./src/css/main3D.css">

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>

</head>
 
<body>

    <section id="navbar">
        <nav class="navbar navbar-expand-lg custom-navbar">
            <div class="container-fluid">
                <a class="navbar-brand d-flex align-items-center" href="../../index.html">
                    <img src="../../src/img/Icono computador.png" alt="Logo" width="40" class="me-2">
                    Computer Graphics
                </a>
 
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
 
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav mx-auto">
                        <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Units</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">GitHub</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Teacher support</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Forum and activities</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Resources</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
                    </ul>
 
                    <div class="d-flex gap-2">
                        <a href="#" class="btn btn-outline-secondary">Log in</a>
                        <a href="#" class="btn btn-secondary">Sign up</a>
                    </div>
                </div>
            </div>
        </nav>
    </section>
 

    <div class="viewer-container">
 
        <div class="peanuts-header">
            <img src="./src/img/Peanuts logo.svg" alt="Peanuts Logo" class="peanuts-logo">
        </div>
 
        <model-viewer
            id="mainViewer"
            alt="Snoopy 3D"
            src="./src/models/glb/Snoopy.glb"
            shadow-intensity="1"
            ar
            camera-controls
            touch-action="pan-y">
 
            <!-- Selector de 3 modelos -->
            <div class="slider">
                <div class="slides">
                    <button class="slide selected" onclick="switchSrc(this, 'Snoopy')"
                        style="background-image: url('./src/img/Snoopy.svg');">
                    </button>
                    <button class="slide" onclick="switchSrc(this, 'Casita')"
                        style="background-image: url('./src/img/Casita.svg');">
                    </button>
                    <button class="slide" onclick="switchSrc(this, 'Buzon')"
                        style="background-image: url('./src/img/Buzon.svg');">
                    </button>
                </div>
            </div>
 
        </model-viewer>
 
    </div>

    <script type="module">
        const modelViewer = document.querySelector("model-viewer");
 
        window.switchSrc = (element, name) => {
            modelViewer.src = "./src/models/glb/" + name + ".glb";
            document.querySelectorAll(".slide").forEach(el => el.classList.remove("selected"));
            element.classList.add("selected");
        };
 
        document.querySelector(".slider").addEventListener('beforexrselect', (ev) => {
            ev.preventDefault();
        });
    </script>
 
</body>
 
</html>
